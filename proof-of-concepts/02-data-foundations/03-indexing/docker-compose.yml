# indexing POC — just Postgres (the harness runs on the host). Port 8341.
name: poc-indexing

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: idx
      POSTGRES_PASSWORD: idx
      POSTGRES_DB: idx
    ports: ["8341:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idx -d idx"]
      interval: 2s
      timeout: 3s
      retries: 30
