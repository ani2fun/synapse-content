# isolation-anomalies POC — just Postgres (the harness runs on the host). Port 8441.
name: poc-transactions-isolation

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: iso
      POSTGRES_PASSWORD: iso
      POSTGRES_DB: iso
    ports: ["8441:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iso -d iso"]
      interval: 2s
      timeout: 3s
      retries: 30
