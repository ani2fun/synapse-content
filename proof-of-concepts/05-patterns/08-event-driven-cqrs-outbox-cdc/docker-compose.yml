# transactional-outbox POC — just Postgres (relay + broker run on the host). Port 8451.
name: poc-outbox

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: outbox
      POSTGRES_PASSWORD: outbox
      POSTGRES_DB: outbox
    ports: ["8451:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outbox -d outbox"]
      interval: 2s
      timeout: 3s
      retries: 30
