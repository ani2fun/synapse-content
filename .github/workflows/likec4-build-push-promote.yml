name: Build, Push, and Promote LikeC4

# The lesson C4 diagrams live in THIS repo (the delta vs Cortex, whose content is
# in-app): any .c4 push rebuilds the merged /c4 SPA. The build engine is vendored
# here as `_build-push-promote.yml` — see the note on the `call` job for why the
# cross-repo reference was dropped.

on:
  push:
    branches:
      - main
    paths:
      - '**/*.c4'
      - 'likec4.Dockerfile'
      - '.github/workflows/likec4-build-push-promote.yml'
  workflow_dispatch:

concurrency:
  group: synapse-likec4-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  call:
    # Vendored, deliberately. This used to be `ani2fun/synapse/.github/...@main` — a cross-repo
    # reference that the 2026-07-18 renames turned into a SILENT hazard: `ani2fun/synapse` now
    # names the Rust app, whose engine happens to take the same inputs, so the job would have
    # kept working while running a different repo's file. Owning the copy removes the coupling.
    uses: ./.github/workflows/_build-push-promote.yml
    with:
      image_repo: ghcr.io/ani2fun/synapse-likec4
      dockerfile: likec4.Dockerfile
      buildx_cache_scope: synapse-likec4
      infra_kustomization_file: deploy/apps/synapse-likec4/overlays/prod/kustomization.yaml
      commit_message: "chore(synapse-likec4): promote image to"
    secrets: inherit
