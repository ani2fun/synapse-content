# Payment system POC — payment API + Postgres. Port block 8420–8421.
name: poc-stripe-payments

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pay
      POSTGRES_PASSWORD: pay
      POSTGRES_DB: pay
    ports: ["8421:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pay -d pay"]
      interval: 2s
      timeout: 3s
      retries: 30

  api:
    build: .
    environment:
      PG_DSN: postgres://pay:pay@db:5432/pay
    ports: ["8420:8000"]
    depends_on:
      db: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 3s
      timeout: 3s
      retries: 30
