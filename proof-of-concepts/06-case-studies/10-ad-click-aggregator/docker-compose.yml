# Ad-click aggregator POC — stream aggregator + Postgres (aggregates). Ports 8410–8411.
name: poc-ad-click-aggregator

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ads
      POSTGRES_PASSWORD: ads
      POSTGRES_DB: ads
    ports: ["8411:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ads -d ads"]
      interval: 2s
      timeout: 3s
      retries: 30

  api:
    build: .
    environment:
      PG_DSN: postgres://ads:ads@db:5432/ads
    ports: ["8410:8000"]
    depends_on:
      db: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 3s
      timeout: 3s
      retries: 30
