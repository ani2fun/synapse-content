# Job scheduler POC — scheduler/worker API + Redis (coordination) + Postgres. Ports 8430–8432.
name: poc-job-scheduler

services:
  redis:
    image: redis:7-alpine
    ports: ["8431:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: js
      POSTGRES_PASSWORD: js
      POSTGRES_DB: js
    ports: ["8432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U js -d js"]
      interval: 2s
      timeout: 3s
      retries: 30

  api:
    build: .
    environment:
      REDIS_URL: redis://redis:6379/0
      PG_DSN: postgres://js:js@db:5432/js
    ports: ["8430:8000"]
    depends_on:
      redis: {condition: service_healthy}
      db: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 3s
      timeout: 3s
      retries: 30
