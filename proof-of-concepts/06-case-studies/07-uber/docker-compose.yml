# Uber POC — matching service + Redis (GEO + locks) + Postgres (trips). Ports 8380–8382.
name: poc-uber

services:
  redis:
    image: redis:7-alpine
    ports: ["8381:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: uber
      POSTGRES_PASSWORD: uber
      POSTGRES_DB: uber
    ports: ["8382:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uber -d uber"]
      interval: 2s
      timeout: 3s
      retries: 30

  api:
    build: .
    environment:
      REDIS_URL: redis://redis:6379/0
      PG_DSN: postgres://uber:uber@db:5432/uber
    ports: ["8380:8000"]
    depends_on:
      redis: {condition: service_healthy}
      db: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 3s
      timeout: 3s
      retries: 30
