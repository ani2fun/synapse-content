# URL shortener POC — port block 8310–8312 (never collides with the synapse stack).
name: poc-url-shortener

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener
      POSTGRES_DB: shortener
    ports: ["8311:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortener -d shortener"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    ports: ["8312:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  api:
    build: .
    environment:
      PG_DSN: postgres://shortener:shortener@db:5432/shortener
      REDIS_URL: redis://redis:6379/0
      RANGE_BATCH: "1000"
    ports: ["8310:8000"]
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 3s
      timeout: 3s
      retries: 30
